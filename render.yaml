# Render Blueprint — tạo 2 Web Service + PostgreSQL (tuỳ chọn)
# Dashboard: New → Blueprint → chọn repo có file này
# Hoặc tạo thủ công theo DEPLOY-RENDER.md

databases:
  - name: bookstore-db
    plan: free
    databaseName: bookstore
    user: bookstore

services:
  - type: web
    name: bookstore-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run db:migrate:deploy && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bookstore-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://REPLACE-WITH-FRONTEND-URL.onrender.com

  - type: web
    name: bookstore-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://REPLACE-WITH-API-URL.onrender.com/api
